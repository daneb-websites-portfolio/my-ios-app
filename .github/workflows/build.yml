name: Compile Swift to IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest

    - name: Compile Swift Code
      run: |
        mkdir -p build/Payload/App.app
        
        # Added -parse-as-library to handle the @main attribute correctly
        xcrun --sdk iphoneos swiftc -parse-as-library -target arm64-apple-ios14.0 App.swift -o build/Payload/App.app/App
        
        # Generates the mandatory structure file
        cat <<EOF > build/Payload/App.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>App</string>
            <key>CFBundleIdentifier</key>
            <string>com.ai.myiosapp</string>
            <key>CFBundleName</key>
            <string>MyAIApp</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
        </dict>
        </plist>
        EOF

    - name: Compress into IPA Artifact
      run: |
        cd build
        zip -r ../CompiledApp.ipa Payload
        
    - name: Upload Working IPA
      uses: actions/upload-artifact@v4
      with:
        name: iOS-App
        path: CompiledApp.ipa
