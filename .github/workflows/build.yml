name: Compile GoRate to IPA
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest

    - name: Process App Icon
      run: |
        mkdir -p Payload/App.app
        if [ -f "8608723.png" ]; then
          cp 8608723.png Payload/App.app/AppIcon.png
        fi

    - name: Compile and Bundle App
      run: |
        # Target modified to iOS 15+ compilation flags to resolve modifier availability errors
        xcrun --sdk iphoneos swiftc -O -parse-as-library -target arm64-apple-ios15.0 App.swift -o Payload/App.app/App
        
        cat <<EOF > Payload/App.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>App</string>
            <key>CFBundleIdentifier</key>
            <string>com.daneb.gorate</string>
            <key>CFBundleName</key>
            <string>GoRate</string>
            <key>CFBundleDisplayName</key>
            <string>GoRate</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>CFBundleIconFiles</key>
            <array>
                <string>AppIcon.png</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationPortrait</string>
            </array>
        </dict>
        </plist>
        EOF

    - name: Compress into IPA Archive
      run: |
        zip -r CompiledApp.ipa Payload
        
    - name: Upload Working IPA
      uses: actions/upload-artifact@v4
      with:
        name: iOS-App
        path: CompiledApp.ipa
