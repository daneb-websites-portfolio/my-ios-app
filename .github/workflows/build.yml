name: Build iOS IPA
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Compile Native Web App
        run: |
          mkdir -p build/App.app
          xcrun -sdk iphoneos swiftc App.swift \
            -target arm64-apple-ios15.0 \
            -parse-as-library \
            -o build/App.app/App \
            -Xlinker -rpath -Xlinker /usr/lib/swift
            
          # Create mandatory minimal application files
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://apple.com"><plist version="1.0"><dict><key>CFBundleExecutable</key><string>App</string><key>CFBundleIdentifier</key><string>com.example.netplay</string><key>CFBundleName</key><string>Netplay</string><key>CFBundleVersion</key><string>1</string><key>CFBundleShortVersionString</key><string>1.0</string></dict></plist>' > build/App.app/Info.plist

      - name: Package App to IPA
        run: |
          mkdir -p Payload
          cp -r build/App.app Payload/
          zip -r App.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-app-ipa
          path: App.ipa
